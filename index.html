<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Dinner Journal</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    /* BASIC STYLING - NO VARIABLES TO PREVENT LOADING ERRORS */
    body { 
      background-color: #1C1812 !important; 
      color: #F0E8D8 !important; 
      font-family: 'Lora', Georgia, serif; 
      display: flex; 
      justify-content: center;
      margin: 0;
    }
    #root { width: 100%; max-width: 500px; min-height: 100vh; padding: 20px; background: #1C1812; }

    .header-title { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #DA7756; margin-bottom: 20px; }
    
    .nav-bar { display: flex; border-bottom: 1px solid #3A3025; margin-bottom: 20px; }
    .nav-btn { flex: 1; padding: 15px; background: none; border: none; color: #9A8878; font-family: 'Lora'; cursor: pointer; border-bottom: 3px solid transparent; }
    .nav-btn.active { color: #DA7756; border-bottom-color: #DA7756; font-weight: bold; }

    .card { background: #26211A; padding: 20px; border-radius: 12px; border: 1px solid #3A3025; margin-bottom: 20px; }
    .label { font-size: 0.75rem; color: #9A8878; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    
    .big-number { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: #DA7756; }
    
    .btn-circle { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #DA7756; background: none; color: #DA7756; font-size: 1.5rem; cursor: pointer; }

    input, select { 
      width: 100%; background: #1C1812; border: 1px solid #3A3025; 
      color: #F0E8D8; font-family: 'Lora'; font-size: 1.1rem; padding: 12px; border-radius: 8px; outline: none; margin-bottom: 15px;
    }

    .ing-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #3A3025; }
    .ing-qty { color: #DA7756; font-weight: bold; font-family: 'Dancing Script', cursive; font-size: 1.4rem; }

    .action-btn { width: 100%; padding: 16px; background: #DA7756; color: white; border: none; border-radius: 8px; font-family: 'Lora'; font-weight: bold; cursor: pointer; }
    .edit-btn { background: none; border: 1px solid #3A3025; color: #9A8878; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { createElement: h, useState, useEffect } = React;

    function App() {
      const [tab, setTab] = useState('planner');
      const [recipes, setRecipes] = useState(() => JSON.parse(localStorage.getItem('dj_v4_recs')) || []);
      const [planner, setPlanner] = useState(() => JSON.parse(localStorage.getItem('dj_v4_plan')) || {});
      const [editingId, setEditingId] = useState(null);
      const [form, setForm] = useState({ name: '', link: '', basePeople: 2, ingredients: [{ name: '', qty: '' }] });

      useEffect(() => localStorage.setItem('dj_v4_recs', JSON.stringify(recipes)), [recipes]);
      useEffect(() => localStorage.setItem('dj_v4_plan', JSON.stringify(planner)), [planner]);

      const plan = planner['today'] || { recipeId: '', peopleCount: 2 };
      const current = recipes.find(r => r.id === parseInt(plan.recipeId));

      const startEdit = (recipe) => {
        setForm(recipe);
        setEditingId(recipe.id);
        setTab('add');
      };

      const saveRecipe = () => {
        if (!form.name) return;
        if (editingId) {
          setRecipes(recipes.map(r => r.id === editingId ? { ...form, id: editingId } : r));
        } else {
          setRecipes([...recipes, { ...form, id: Date.now() }]);
        }
        setEditingId(null);
        setTab('recipes');
        setForm({ name: '', link: '', basePeople: 2, ingredients: [{ name: '', qty: '' }] });
      };

      return h('div', null,
        h('div', { className: 'header-title' }, 'Dinner Journal'),
        h('div', { className: 'nav-bar' },
          h('button', { className: `nav-btn ${tab === 'planner' ? 'active' : ''}`, onClick: () => setTab('planner') }, 'Plan'),
          h('button', { className: `nav-btn ${tab === 'recipes' ? 'active' : ''}`, onClick: () => setTab('recipes') }, 'Library'),
          h('button', { className: `nav-btn ${tab === 'add' ? 'active' : ''}`, onClick: () => { setEditingId(null); setTab('add'); } }, '+ New')
        ),

        tab === 'planner' && h('div', null,
          h('div', { className: 'card' },
            h('div', { className: 'label' }, 'Guests Tonight'),
            h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' } },
              h('div', { className: 'big-number' }, plan.peopleCount + ' People'),
              h('div', { style: { display: 'flex', gap: '10px' } },
                h('button', { className: 'btn-circle', onClick: () => setPlanner({...planner, today: {...plan, peopleCount: Math.max(1, plan.peopleCount - 1)}}) }, '−'),
                h('button', { className: 'btn-circle', onClick: () => setPlanner({...planner, today: {...plan, peopleCount: plan.peopleCount + 1}}) }, '+')
              )
            ),
            h('div', { className: 'label' }, 'Menu Selection'),
            h('select', { value: plan.recipeId, onChange: (e) => setPlanner({...planner, today: {...plan, recipeId: e.target.value}}) },
              h('option', { value: '' }, 'Pick a recipe...'),
              recipes.map(r => h('option', { key: r.id, value: r.id }, r.name))
            )
          ),
          current && h('div', { className: 'card' },
            h('div', { className: 'label' }, 'Scaled Ingredients'),
            current.ingredients.map((ing, i) => h('div', { key: i, className: 'ing-row' },
              h('span', null, ing.name),
              h('span', { className: 'ing-qty' }, ((parseFloat(ing.qty) / current.basePeople) * plan.peopleCount).toFixed(1))
            )),
            current.link && h('a', { href: current.link, target: '_blank', style: { display: 'block', textAlign: 'center', marginTop: '20px', color: '#DA7756', textDecoration: 'none' } }, 'Open Recipe Video ↗')
          )
        ),

        tab === 'recipes' && h('div', null,
          recipes.map(r => h('div', { key: r.id, className: 'card' },
            h('div', { style: { fontSize: '1.4rem', color: '#DA7756', marginBottom: '5px' } }, r.name),
            h('div', { style: { fontSize: '0.9rem', color: '#9A8878', fontStyle: 'italic', marginBottom: '15px' } }, 'Serves ' + r.basePeople + ' in video'),
            h('div', { style: { display: 'flex', gap: '10px' } },
              h('button', { className: 'edit-btn', onClick: () => startEdit(r) }, 'Edit Math/Details'),
              h('button', { className: 'edit-btn', onClick: () => confirm('Delete?') && setRecipes(recipes.filter(x => x.id !== r.id)) }, 'Delete')
            )
          ))
        ),

        tab === 'add' && h('div', { className: 'card' },
          h('div', { className: 'label' }, 'Recipe Name'),
          h('input', { value: form.name, onChange: e => setForm({...form, name: e.target.value}) }),
          h('div', { className: 'label' }, 'YouTube URL'),
          h('input', { value: form.link, onChange: e => setForm({...form, link: e.target.value}) }),
          h('div', { className: 'label' }, 'How many does this serve in the video?'),
          h('input', { type: 'number', value: form.basePeople, onChange: e => setForm({...form, basePeople: e.target.value}) }),
          
          h('div', { className: 'label', style: { marginTop: '20px' } }, 'Ingredients List (Item | Qty)'),
          form.ingredients.map((ing, i) => h('div', { key: i, style: { display: 'flex', gap: '10px' } },
            h('input', { placeholder: 'Item', value: ing.name, onChange: e => { let ings = [...form.ingredients]; ings[i].name = e.target.value; setForm({...form, ingredients: ings}) } }),
            h('input', { placeholder: 'Qty', style: { width: '80px' }, value: ing.qty, onChange: e => { let ings = [...form.ingredients]; ings[i].qty = e.target.value; setForm({...form, ingredients: ings}) } })
          )),
          h('button', { onClick: () => setForm({...form, ingredients: [...form.ingredients, {name:'', qty:''}]}), style: { color: '#DA7756', background: 'none', border: 'none', marginBottom: '20px', cursor: 'pointer' } }, '+ Add Row'),
          h('button', { className: 'action-btn', onClick: saveRecipe }, editingId ? 'Update Recipe' : 'Save Recipe')
        )
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
