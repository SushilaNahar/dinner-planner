<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dinner Planner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { 
      background-color: #F2F2F7; 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      color: #000000; 
    }
    button, input, select { font-family: inherit; }
    ::-webkit-scrollbar { display: none; }
    .ios-card { background: #FFFFFF; border-radius: 12px; margin-bottom: 16px; border: 0.5px solid #D1D1D6; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { createElement: h, useState, useEffect, Fragment } = React;

    const C = {
      orange: '#FF9500', // Authentic Apple Notes Orange
      black: '#000000',
      gray: '#8E8E93',
      bg: '#F2F2F7',
      white: '#FFFFFF'
    };

    const generateDates = () => {
      const dates = [];
      for (let i = 0; i < 14; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        dates.push({
          key: d.toISOString().split('T')[0],
          dayName: d.toLocaleDateString('en-US', { weekday: 'short' }).toUpperCase(),
          dateNum: d.getDate(),
        });
      }
      return dates;
    };

    function App() {
      const [tab, setTab] = useState('planner');
      const [recipes, setRecipes] = useState(() => JSON.parse(localStorage.getItem('sp_recipes')) || []);
      const [planner, setPlanner] = useState(() => JSON.parse(localStorage.getItem('sp_planner')) || {});
      const [searchQuery, setSearchQuery] = useState('');
      const [expandedRecipe, setExpandedRecipe] = useState(null);
      
      const dateList = generateDates();
      const [selectedDateKey, setSelectedDateKey] = useState(dateList[0].key);
      const [isAddingRecipe, setIsAddingRecipe] = useState(false);
      const [newRec, setNewRec] = useState({ name: '', link: '', basePeople: 2, ingredients: [{ name: '', qty: '' }] });

      useEffect(() => localStorage.setItem('sp_recipes', JSON.stringify(recipes)), [recipes]);
      useEffect(() => localStorage.setItem('sp_planner', JSON.stringify(planner)), [planner]);

      const activePlan = planner[selectedDateKey] || { recipeId: '', peopleCount: 2 };
      const currentRecipe = recipes.find(r => r.id === parseInt(activePlan.recipeId));

      const filteredRecipes = recipes.filter(r => r.name.toLowerCase().includes(searchQuery.toLowerCase()));

      return h('div', { style: { minHeight: '100vh', paddingBottom: '40px' } },
        
        // Navigation Header
        h('div', { style: { padding: '40px 16px 10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
          h('h1', { style: { fontSize: '34px', fontWeight: 'bold', color: C.black } }, tab === 'planner' ? 'Dinner' : 'Recipes'),
          h('button', { 
            onClick: () => setTab(tab === 'planner' ? 'recipes' : 'planner'),
            style: { border: 'none', background: 'none', color: C.orange, fontSize: '17px', fontWeight: '500' }
          }, tab === 'planner' ? 'Recipe Book' : 'Back')
        ),

        tab === 'planner' && h('div', null,
          // Date Strip
          h('div', { style: { display: 'flex', gap: '12px', overflowX: 'auto', padding: '10px 16px' } },
            dateList.map(d => {
              const isSelected = selectedDateKey === d.key;
              return h('button', {
                key: d.key, onClick: () => setSelectedDateKey(d.key),
                style: {
                  minWidth: '50px', padding: '8px', borderRadius: '10px', border: 'none',
                  background: isSelected ? C.orange : 'transparent',
                  color: isSelected ? C.white : C.black, textAlign: 'center'
                }
              }, 
                h('div', { style: { fontSize: '10px', fontWeight: 'bold', opacity: isSelected ? 1 : 0.5 } }, d.dayName),
                h('div', { style: { fontSize: '20px', fontWeight: '600' } }, d.dateNum)
              );
            })
          ),

          h('div', { style: { padding: '16px' } },
            h('div', { className: 'ios-card', style: { padding: '16px' } },
              h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' } },
                h('span', { style: { fontSize: '17px', fontWeight: '600' } }, 'Heads: ' + activePlan.peopleCount),
                h('div', { style: { display: 'flex', gap: '10px' } },
                  ['−', '+'].map(op => h('button', {
                    key: op,
                    onClick: () => setPlanner({...planner, [selectedDateKey]: {...activePlan, peopleCount: op === '+' ? activePlan.peopleCount + 1 : Math.max(1, activePlan.peopleCount - 1)}}),
                    style: { width: '32px', height: '32px', borderRadius: '50%', border: 'none', background: C.bg, color: C.orange, fontWeight: 'bold', fontSize: '18px' }
                  }, op))
                )
              ),
              h('select', { 
                value: activePlan.recipeId, 
                onChange: (e) => setPlanner({...planner, [selectedDateKey]: {...activePlan, recipeId: e.target.value}}),
                style: { width: '100%', padding: '12px', borderRadius: '8px', border: 'none', background: C.bg, fontSize: '17px', color: C.orange, fontWeight: '500', outline: 'none' }
              },
                h('option', { value: '' }, 'Choose Meal'),
                recipes.map(r => h('option', { key: r.id, value: r.id }, r.name))
              )
            ),

            currentRecipe && h('div', { className: 'ios-card', style: { padding: '16px' } },
              h('h3', { style: { fontSize: '13px', color: C.gray, textTransform: 'uppercase', marginBottom: '12px' } }, 'Ingredients List'),
              currentRecipe.ingredients.map((ing, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', padding: '10px 0', borderBottom: '0.5px solid #eee' } },
                h('span', null, ing.name),
                h('span', { style: { fontWeight: 'bold', color: C.gray } }, ((ing.qty / currentRecipe.basePeople) * activePlan.peopleCount).toFixed(1))
              )),
              currentRecipe.link && h('a', { href: currentRecipe.link, target: '_blank', style: { display: 'block', marginTop: '15px', color: C.orange, textDecoration: 'none', fontWeight: '600' } }, 'Video Tutorial ↗')
            )
          )
        ),

        tab === 'recipes' && h('div', { style: { padding: '0 16px' } },
          !isAddingRecipe ? h(Fragment, null,
            // Search Bar
            h('input', {
              placeholder: 'Search recipes...',
              value: searchQuery,
              onChange: (e) => setSearchQuery(e.target.value),
              style: { width: '100%', padding: '12px', borderRadius: '10px', border: 'none', background: '#E3E3E8', marginBottom: '20px', fontSize: '16px' }
            }),
            
            h('button', { 
              onClick: () => setIsAddingRecipe(true), 
              style: { width: '100%', padding: '12px', background: 'none', border: '1px dashed ' + C.orange, color: C.orange, borderRadius: '10px', fontWeight: '600', marginBottom: '20px' } 
            }, '+ Create New Recipe'),
            
            filteredRecipes.map(r => h('div', { 
              key: r.id, 
              className: 'ios-card',
              style: { padding: '16px', overflow: 'hidden' }
            },
              h('div', { 
                onClick: () => setExpandedRecipe(expandedRecipe === r.id ? null : r.id),
                style: { display: 'flex', justifyContent: 'space-between', cursor: 'pointer' } 
              },
                h('div', null,
                  h('div', { style: { fontSize: '18px', fontWeight: '600' } }, r.name),
                  h('div', { style: { fontSize: '13px', color: C.gray } }, 'Base: ' + r.basePeople + ' guests')
                ),
                h('span', { style: { color: C.orange, fontSize: '20px' } }, expandedRecipe === r.id ? '↓' : '→')
              ),
              
              expandedRecipe === r.id && h('div', { style: { marginTop: '16px', borderTop: '0.5px solid #eee', paddingTop: '10px' } },
                r.ingredients.map((ing, i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', fontSize: '15px', padding: '4px 0' } },
                  h('span', null, ing.name),
                  h('span', { style: { color: C.gray } }, ing.qty)
                )),
                h('div', { style: { marginTop: '12px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                  r.link ? h('a', { href: r.link, target: '_blank', style: { color: C.orange, textDecoration: 'none', fontWeight: '600', fontSize: '14px' } }, 'Watch Video') : h('div'),
                  h('button', { 
                    onClick: () => confirm('Delete?') && setRecipes(recipes.filter(x => x.id !== r.id)),
                    style: { border: 'none', background: 'none', color: 'red', fontSize: '13px' } 
                  }, 'Delete')
                )
              )
            ))
          ) : h('div', { className: 'ios-card', style: { padding: '20px' } },
            h('h3', { style: { marginBottom: '15px' } }, 'New Recipe'),
            h('input', { placeholder: 'Name', style: { width: '100%', padding: '12px', marginBottom: '10px', background: C.bg, border: 'none', borderRadius: '8px' }, onChange: e => setNewRec({...newRec, name: e.target.value}) }),
            h('input', { placeholder: 'YouTube Link', style: { width: '100%', padding: '12px', marginBottom: '10px', background: C.bg, border: 'none', borderRadius: '8px' }, onChange: e => setNewRec({...newRec, link: e.target.value}) }),
            h('input', { type: 'number', placeholder: 'Base People', style: { width: '100%', padding: '12px', marginBottom: '10px', background: C.bg, border: 'none', borderRadius: '8px' }, onChange: e => setNewRec({...newRec, basePeople: e.target.value}) }),
            
            h('p', { style: { fontSize: '12px', color: C.gray, marginBottom: '8px', fontWeight: 'bold' } }, 'INGREDIENTS'),
            newRec.ingredients.map((ing, i) => h('div', { key: i, style: { display: 'flex', gap: '8px', marginBottom: '8px' } },
              h('input', { placeholder: 'Item', style: { flex: 2, padding: '10px', background: C.bg, border: 'none', borderRadius: '8px' }, onChange: e => { let ings = [...newRec.ingredients]; ings[i].name = e.target.value; setNewRec({...newRec, ingredients: ings}) } }),
              h('input', { type: 'number', placeholder: 'Qty', style: { flex: 1, padding: '10px', background: C.bg, border: 'none', borderRadius: '8px' }, onChange: e => { let ings = [...newRec.ingredients]; ings[i].qty = e.target.value; setNewRec({...newRec, ingredients: ings}) } })
            )),
            h('button', { onClick: () => setNewRec({...newRec, ingredients: [...newRec.ingredients, {name:'', qty:''}]}), style: { color: C.orange, background: 'none', border: 'none', fontSize: '14px', marginBottom: '20px' } }, '+ Add Row'),
            
            h('div', { style: { display: 'flex', gap: '10px' } },
              h('button', { onClick: () => setIsAddingRecipe(false), style: { flex: 1, padding: '12px', borderRadius: '8px', border: 'none', background: '#E3E3E8' } }, 'Cancel'),
              h('button', { 
                onClick: () => { if(newRec.name) { setRecipes([...recipes, {...newRec, id: Date.now()}]); setIsAddingRecipe(false); } },
                style: { flex: 1, padding: '12px', borderRadius: '8px', border: 'none', background: C.orange, color: '#fff', fontWeight: 'bold' } 
              }, 'Save')
            )
          )
        )
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
